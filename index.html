<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Seating System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap');
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #020617;
            color: white;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2.5rem;
        }
        .hide { display: none !important; }
        
        .chalkboard {
            background: rgba(30, 41, 59, 0.5);
            border: 4px solid rgba(71, 85, 105, 0.5);
            border-radius: 1.5rem;
            height: 8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .chalkboard-text {
            color: rgba(100, 116, 139, 0.8);
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 1.5rem;
            padding-left: 1.5rem;
            text-transform: uppercase;
            user-select: none;
        }
        
        .seat-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            touch-action: manipulation;
        }
        .seat-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }
        .seat-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- หน้า Login -->
        <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
            <div class="w-full max-w-md glass-panel p-8 rounded-[2.5rem] shadow-2xl border border-white/5">
                <div id="role-selection" class="space-y-6">
                    <div class="text-center">
                        <div class="w-20 h-20 bg-blue-600/20 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-blue-500/30">
                            <i data-lucide="armchair" class="text-blue-500 w-10 h-10"></i>
                        </div>
                        <h1 class="text-3xl font-bold">ระบบจองที่นั่ง</h1>
                        <p class="text-slate-400 mt-2 text-sm uppercase tracking-widest">Smart Classroom</p>
                    </div>
                    <div class="grid gap-4">
                        <button onclick="selectRole('student')" class="flex items-center gap-4 p-5 bg-blue-600 hover:bg-blue-500 rounded-2xl transition-all font-bold shadow-lg shadow-blue-900/20 active:scale-95">
                            <i data-lucide="user"></i> <span>นักเรียน (เลือกเลขที่)</span>
                        </button>
                        <button onclick="selectRole('admin')" class="flex items-center gap-4 p-5 bg-red-600 hover:bg-red-500 rounded-2xl transition-all font-bold shadow-lg shadow-red-900/20 active:scale-95">
                            <i data-lucide="shield"></i> <span>ผู้ดูแลระบบ (Admin)</span>
                        </button>
                    </div>
                </div>

                <div id="login-form" class="hide space-y-6">
                    <button onclick="backToRoles()" class="text-slate-500 flex items-center gap-1 text-xs hover:text-slate-300 transition-colors uppercase font-bold">
                        <i data-lucide="arrow-left" class="w-3 h-3"></i> ย้อนกลับ
                    </button>
                    <h2 id="login-title" class="text-xl font-bold text-center"></h2>
                    <input type="number" id="input-no" 
                           class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl text-center text-4xl font-black outline-none transition-all focus:border-blue-500/50"
                           placeholder="00">
                    <button onclick="attemptLogin()" id="btn-submit" class="w-full py-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-transform text-white">
                        ยืนยันเข้าสู่ระบบ
                    </button>
                </div>
            </div>
        </div>

        <!-- หน้าผังที่นั่ง -->
        <div id="main-screen" class="hide min-h-screen p-4 md:p-8">
            <div class="max-w-6xl mx-auto">
                <header class="flex justify-between items-center glass-panel p-4 rounded-3xl mb-8 sticky top-4 z-50 shadow-2xl">
                    <div class="flex items-center gap-4">
                        <div id="user-badge" class="w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl shadow-lg"></div>
                        <div>
                            <p id="user-role-label" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest leading-none mb-1"></p>
                            <p id="user-name-display" class="font-bold text-white text-sm md:text-base"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <div id="sync-indicator" class="text-[10px] font-bold text-slate-500 flex items-center gap-1 bg-slate-800 px-3 py-1.5 rounded-full">
                            <span id="sync-dot" class="w-2 h-2 rounded-full bg-yellow-500"></span>
                            <span id="sync-text">CONNECTING</span>
                        </div>
                        <button onclick="location.reload()" class="p-3 bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-500 rounded-xl transition-all">
                            <i data-lucide="log-out"></i>
                        </button>
                    </div>
                </header>

                <div class="relative bg-slate-900/40 border border-white/5 rounded-[3rem] p-8 md:p-16 overflow-x-auto min-w-[1000px] shadow-2xl">
                    <!-- กระดาน -->
                    <div class="flex justify-between items-start mb-24 border-b border-white/5 pb-12">
                        <div class="w-24 h-24 border-2 border-red-500/10 rounded-2xl flex items-center justify-center text-red-500/20 font-bold text-[10px] -rotate-12 uppercase">Bulletin</div>
                        <div class="flex-1 max-w-lg mx-12">
                            <div class="chalkboard">
                                <span class="chalkboard-text">กระดาน</span>
                            </div>
                        </div>
                        <div class="w-24 h-24 border-2 border-red-500/10 rounded-2xl flex items-center justify-center text-red-500/20 font-bold text-[10px] rotate-12 uppercase">Bulletin</div>
                    </div>

                    <!-- โต๊ะครู -->
                    <div class="absolute right-12 top-48 w-40 h-24 border-2 border-green-500/20 bg-green-500/5 rounded-3xl flex items-center justify-center">
                        <span class="text-green-500/30 font-bold text-[11px] tracking-widest uppercase">โต๊ะครู</span>
                    </div>

                    <!-- ผังเก้าอี้ -->
                    <div id="seat-container" class="seat-grid relative z-10"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STUDENT_LIST = {
            "1": "ด.ช.กรวัฒน์ ผดาวัน", "2": "ด.ช.ชนพัฒน์ บุญดี", "3": "ด.ช.ณัฐกฤต แซ่เตีย",
            "4": "ด.ช.ณัฐนันท์ แซ่โอ่ว", "5": "ด.ช.ณัฐสิทธิ์ ชะรารัมย์", "6": "ด.ช.ดนย์ศิรา ฟักทองพรรณ",
            "7": "ด.ช.ต้นแรม ต้นสิงห์", "8": "ด.ช.เตชิษฐ์ กาเจริญ", "9": "ด.ช.ธนภูมิ นาคบุตร",
            "10": "ด.ช.ธีรดนย์ นามวิจิตร", "11": "ด.ช.นพดล ทองจันทร์", "12": "ด.ช.ปัณณทัต อินทปัตย์",
            "13": "ด.ช.ปัณณวิชญ์ พลวลัยรัตน์", "14": "ด.ช.พัธรกฤษฎิ์ สว่างแก้ว", "15": "ด.ช.พัทรศักดิ์ โพธะกัน",
            "16": "ด.ช.พิรุฬห์กร ทองดี", "17": "ด.ช.พีระพล คำพันชนะ", "18": "ด.ช.ภูพัฒน์ แสนกุล",
            "19": "ด.ช.สุรเชษฐ์ จอมโคตร", "20": "ด.ช.เอกวิศว์ สุขลิ้ม", "21": "ด.ญ.กรมาณี ทองลือ",
            "22": "ด.ญ.ครองขวัญ สร้อยสูงเนิน", "23": "ด.ญ.จิระประไพ ฉัตรทัน", "24": "ด.ญ.ญาดาจันทมาศ ทองรักษ์",
            "25": "ด.ญ.ณพิชญา หนูปลอด", "26": "ด.ญ.ธนพร เกิดพุ่ม", "27": "ด.ญ.ธนัญญา โพธิ์มี",
            "28": "ด.ญ.ธัญญาภิทย์ กุยยาวัฒนานนท์", "29": "ด.ญ.ธัญลักษณ์ เหงสกุล", "30": "ด.ญ.ธันยภรณ์ ยิ่งผล",
            "31": "ด.ญ.ธีรนาฏ สิทธิมงคล", "32": "ด.ญ.นพกาญจน์ ไตรรวรรัตน์", "33": "ด.ญ.นิชาภัทร ไชยพร",
            "34": "ด.ญ.ปัญณวีร์ ชัยมาลา", "35": "ด.ญ.พาขวัญ อนันตวงษ์", "36": "ด.ญ.ภคพร ประเสริฐไทย",
            "37": "ด.ญ.วิชญา ศรีหริ่ง", "38": "ด.ญ.วิภาดา ภู่เอี่ยม", "39": "ด.ญ.วิลาสินี รอดภัย",
            "40": "ด.ญ.ศิรินภา ศรีวิเศษ", "3205": "คุณครูผู้ดูแลระบบ"
        };

        let currentRole = null;
        let currentUserNo = null;
        let seats = {};
        let db = null;
        let isSaving = false;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'classroom-v3-final';

        function selectRole(role) {
            currentRole = role;
            document.getElementById('role-selection').classList.add('hide');
            document.getElementById('login-form').classList.remove('hide');
            document.getElementById('login-title').innerText = role === 'admin' ? "ADMIN LOGIN" : "กรอกเลขที่นักเรียน";
            document.getElementById('btn-submit').className = `w-full py-5 rounded-2xl font-bold text-white text-lg shadow-xl active:scale-95 transition-transform ${role === 'admin' ? 'bg-red-600' : 'bg-blue-600'}`;
            document.getElementById('input-no').focus();
            lucide.createIcons();
        }

        function backToRoles() {
            document.getElementById('role-selection').classList.remove('hide');
            document.getElementById('login-form').classList.add('hide');
        }

        async function attemptLogin() {
            const val = document.getElementById('input-no').value;
            if ((currentRole === 'admin' && val === '3205') || (currentRole === 'student' && STUDENT_LIST[val])) {
                currentUserNo = val;
                enterClassroom();
            } else {
                alert("ข้อมูลไม่ถูกต้อง! ลองเลขที่ 1 หรือรหัส 3205");
            }
        }

        async function enterClassroom() {
            document.getElementById('login-screen').classList.add('hide');
            document.getElementById('main-screen').classList.remove('hide');
            const badge = document.getElementById('user-badge');
            badge.innerText = currentRole === 'admin' ? 'AD' : currentUserNo;
            badge.className = `w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl shadow-lg ${currentRole === 'admin' ? 'bg-red-600' : 'bg-blue-600'}`;
            document.getElementById('user-role-label').innerText = currentRole === 'admin' ? 'OFFICER' : 'STUDENT';
            document.getElementById('user-name-display').innerText = STUDENT_LIST[currentUserNo];
            
            initCloudSync();
            lucide.createIcons();
        }

        async function initCloudSync() {
            const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
            if (firebaseConfig.projectId) {
                try {
                    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                    db = firebase.firestore();
                    await firebase.auth().signInAnonymously();
                    
                    db.collection('artifacts').doc(appId).collection('public').doc('data').collection('seats')
                        .onSnapshot(snap => {
                            seats = {};
                            snap.forEach(doc => seats[doc.id] = doc.data());
                            renderSeats();
                            updateSyncStatus('ONLINE', 'bg-green-500');
                        }, err => {
                            console.error(err);
                            updateSyncStatus('ERROR', 'bg-red-500');
                        });
                } catch (e) {
                    console.error(e);
                    renderSeats();
                }
            } else {
                renderSeats();
                updateSyncStatus('DEMO MODE', 'bg-blue-500');
            }
        }

        function updateSyncStatus(text, colorClass) {
            document.getElementById('sync-text').innerText = text;
            document.getElementById('sync-dot').className = `w-2 h-2 rounded-full ${colorClass}`;
        }

        function renderSeats() {
            const container = document.getElementById('seat-container');
            container.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 5; c++) {
                    const pair = document.createElement('div');
                    pair.className = "flex bg-slate-950/60 border border-white/5 rounded-2xl overflow-hidden shadow-xl";
                    pair.appendChild(createSeat(r, c, 'L'));
                    pair.appendChild(createSeat(r, c, 'R'));
                    container.appendChild(pair);
                }
            }
            lucide.createIcons();
        }

        function createSeat(row, col, side) {
            const seatId = `${row}-${col}-${side}`;
            const data = seats[seatId];
            const isMine = data && data.no === currentUserNo;
            
            const btn = document.createElement('button');
            btn.className = `flex-1 h-20 flex flex-col items-center justify-center seat-btn relative group`;
            
            if (data) {
                btn.classList.add(isMine ? 'bg-blue-600' : 'bg-emerald-600/40');
                btn.innerHTML = `
                    <i data-lucide="armchair" class="w-5 h-5 mb-1 ${isMine ? 'text-white' : 'text-emerald-400'}"></i>
                    <p class="text-[10px] font-black">${isMine ? 'ME' : data.no}</p>
                    <p class="text-[7px] font-bold opacity-60 truncate w-12 mt-0.5">${data.name.split(' ')[0]}</p>
                `;
            } else {
                btn.classList.add('text-slate-800', 'hover:bg-blue-500/10');
                btn.innerHTML = `<i data-lucide="armchair" class="opacity-10 w-4 h-4"></i>`;
            }

            // จัดการการลบสำหรับ Admin
            if (currentRole === 'admin' && data) {
                const delOverlay = document.createElement('div');
                delOverlay.className = "absolute inset-0 bg-red-600 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-10";
                delOverlay.innerHTML = `<i data-lucide="trash-2" class="w-5 h-5 text-white"></i>`;
                delOverlay.onclick = async (e) => {
                    e.stopPropagation();
                    if (db) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('seats').doc(seatId).delete();
                };
                btn.appendChild(delOverlay);
            }

            // จัดการการจอง
            btn.onclick = async () => {
                if (data || currentRole === 'admin' || isSaving) return;

                // ตรวจสอบว่าจองไปหรือยัง
                const already = Object.values(seats).find(s => s.no === currentUserNo);
                if (already) {
                    alert("คุณจองที่นั่งไปแล้วครับ!");
                    return;
                }

                isSaving = true;
                btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin text-blue-500"></i>`;
                
                try {
                    if (db) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('seats').doc(seatId).set({
                            no: currentUserNo,
                            name: STUDENT_LIST[currentUserNo],
                            time: Date.now()
                        });
                    } else {
                        seats[seatId] = { no: currentUserNo, name: STUDENT_LIST[currentUserNo] };
                        renderSeats();
                    }
                } catch (err) {
                    alert("การจองล้มเหลว กรุณาลองใหม่");
                } finally {
                    isSaving = false;
                }
            };

            return btn;
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
